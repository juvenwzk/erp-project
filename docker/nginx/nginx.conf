worker_processes auto;

error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    charset utf-8;

    sendfile on;
    keepalive_timeout 65;

    gzip on;
    gzip_min_length 1k;
    gzip_types text/plain text/css text/javascript application/json application/javascript image/svg+xml;
    gzip_vary on;

    upstream erp_backend {
        server erp-app:8080;
    }

    # Alpine 镜像无 proxy_params，在此统一定义
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Authorization $http_authorization;
    proxy_connect_timeout 30s;
    proxy_send_timeout 30s;
    client_max_body_size 10m;

    server {
        listen 100;
        server_name localhost;

        root /usr/share/nginx/html;
        index index.html;

        # 登录：GET 返回页面，POST 转发后端
        location = /login {
            if ($request_method = POST) {
                rewrite ^ /_login_api last;
            }
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin "*" always;
                add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
                add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
                add_header Content-Length 0;
                add_header Content-Type text/plain;
                return 204;
            }
            try_files /login.html =404;
        }

        location = /_login_api {
            internal;
            proxy_pass http://erp_backend/login;
            proxy_read_timeout 120s;
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
        }

        # AI 助手（后端路径含 /api/agent，不做 rewrite）
        location /api/agent {
            proxy_pass http://erp_backend;
            proxy_read_timeout 180s;
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin "*" always;
                add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
                add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
                return 204;
            }
        }

        # 通用 API：去掉 /api 前缀后转发
        location /api/ {
            rewrite ^/api/(.*) /$1 break;
            proxy_pass http://erp_backend;
            proxy_read_timeout 120s;
            client_max_body_size 50m;
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin "*" always;
                add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
                add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
                return 204;
            }
        }

        # 前端 Vue 部分接口不带 /api 前缀，需单独转发后端
        location ~ ^/(users|goods|goods-type|supplier|customers|purchase-order|sale-order|upload)(/|$) {
            proxy_pass http://erp_backend;
            proxy_read_timeout 120s;
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin "*" always;
                add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
                add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
                return 204;
            }
        }

        # 前端静态页面（放最后，避免吞掉 API 请求）
        location / {
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }

        error_page 500 502 503 504 /50x.html;
    }
}
