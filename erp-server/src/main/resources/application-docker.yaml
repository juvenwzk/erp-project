spring:
  datasource:
    url: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:erp}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=utf8
    username: ${MYSQL_USER:ERP_USER}
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  ai:
    openai:
      base-url: https://api.deepseek.com
      api-key: ${DEEPSEEK_API_KEY:}
      chat:
        options:
          model: deepseek-v4-flash

# 阿里云 OSS（Docker 从环境变量注入，见 docker-compose.yml / .env）
aliyun:
  oss:
    access-key-id: ${OSS_ACCESS_KEY_ID:}
    access-key-secret: ${OSS_ACCESS_KEY_SECRET:}
    endpoint: ${ALIYUN_OSS_ENDPOINT:https://oss-cn-beijing.aliyuncs.com}
    bucket: ${ALIYUN_OSS_BUCKET:kangcode-erp}
    region: ${ALIYUN_OSS_REGION:cn-beijing}

app:
  upload:
    local-dir: /app/uploads
    local-url-prefix: /uploads

mybatis:
  configuration:
    map-underscore-to-camel-case: true
